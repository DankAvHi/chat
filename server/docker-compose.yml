services:
    server:
        build: .
        volumes:
            - .:/usr/app/
            - /usr/app/node_modules
        ports:
            - "${PORT}:${PORT}"
        networks:
            - node-network

    mongodb-primary:
        container_name: mongodb-primary
        hostname: mongodb-primary
        image: mongo:4.4
        restart: always
        build: ./docker/db
        ports:
            - "27017:27017"
        depends_on:
            - mongodb-secondary-0
            - mongodb-secondary-1
        links:
            - mongodb-secondary-0
            - mongodb-secondary-1
        networks:
            - node-network
        command: ["--bind_ip_all", "--replSet", "rs0", "--auth", "--keyFile", "/data/replica.key"]
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${DATABASE_USERNAME}
            - MONGO_INITDB_ROOT_PASSWORD=${DATABASE_PASSWORD}
            - MONGO_INITDB_ROOT_DATABASE=chat
    mongodb-secondary-0:
        container_name: mongodb-secondary-0
        hostname: mongodb-secondary-0
        image: mongo:4.4
        restart: always
        build: ./docker/db
        ports:
            - "27018:27017"
        networks:
            - node-network
        command: ["--bind_ip_all", "--replSet", "rs0", "--auth", "--keyFile", "/data/replica.key"]
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${DATABASE_USERNAME}
            - MONGO_INITDB_ROOT_PASSWORD=${DATABASE_PASSWORD}
            - MONGO_INITDB_ROOT_DATABASE=chat
    mongodb-secondary-1:
        container_name: mongodb-secondary-1
        hostname: mongodb-secondary-1
        image: mongo:4.4
        restart: always
        build: ./docker/db
        ports:
            - "27019:27017"
        networks:
            - node-network
        command: ["--bind_ip_all", "--replSet", "rs0", "--auth", "--keyFile", "/data/replica.key"]
        environment:
            - MONGO_INITDB_ROOT_USERNAME=${DATABASE_USERNAME}
            - MONGO_INITDB_ROOT_PASSWORD=${DATABASE_PASSWORD}
            - MONGO_INITDB_ROOT_DATABASE=chat
    mongoinit:
        image: mongo:4.4
        restart: "no"
        depends_on:
            - mongodb-primary
            - mongodb-secondary-0
            - mongodb-secondary-1
        volumes:
            - ./docker/db/rs-init.sh:/docker-entrypoint-initdb.d/rs-init.sh
        entrypoint: ["bash", "/docker-entrypoint-initdb.d/rs-init.sh"]
        networks:
            - node-network

volumes:
    dbdata:

networks:
    node-network:
        driver: bridge
